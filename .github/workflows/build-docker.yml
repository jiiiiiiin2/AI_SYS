name: Build & Docker

on:
  pull_request:
    paths:
      - 'code/backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-docker.yml'
  push:
    branches:
      - main
      - main--code
    paths:
      - 'code/backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-docker.yml'

permissions:
  contents: read

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: code/backend
          file: code/backend/Dockerfile
          push: false
          load: true
          tags: ai-sys-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm ai-sys-backend:test python -m pytest --version
