name: Docs Lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs-lint.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/docs-lint.yml'

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
