name: Code Check

on:
  pull_request:
    paths:
      - 'code/**'
      - '.github/workflows/code-check.yml'
  push:
    branches:
      - main
      - main--code
    paths:
      - 'code/**'
      - '.github/workflows/code-check.yml'

permissions:
  contents: read

jobs:
  lint-and-type:
    name: Ruff & Mypy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: code/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r code/backend/requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check code/

      - name: Ruff format check
        run: ruff format --check code/

      - name: Mypy type check
        run: mypy code/backend/app --ignore-missing-imports

  security:
    name: Bandit & pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        wit        wit        wit        w.11'
          cache: 'pip'
          cache-dependency-path: code/backend/requirements.txt

      - name: Install tools
        run: |
          pip in          pip in          pip iip i          pip in               - name: Bandit security scan
        run: bandit         run: bandit         run-         run: bandependency scan
        run: pip-audit -r code/backend/requirements.txt
