name: PR Validation

on:
  pull_request:
    branches:
      - main
      - main--code

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr:
    name: PR Checklist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const validPrefixes = ["feat", "fix", "docs", "refactor", "test", "chore", "ci"];
            const hasValidPrefix = validPrefixes.some(prefix => title.startsWith(prefix + ":"));
            if (!hasValidPrefix) {
              core.setFailed(`PR title must start with: ${validPrefixes.join(", ")}`);
            }
