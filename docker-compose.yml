services:
  db:
    image: pgvector/pgvector:pg17
    container_name: aisys-db
    environment:
      POSTGRES_DB: aisys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./code/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./code/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aisys"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./code/backend
    container_name: aisys-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aisys
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
