name: AISYS
options:
  minimumXcodeGenVersion: 2.38.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    MACCATALYST_DEPLOYMENT_TARGET: 15.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    GENERATE_INFOPLIST_FILE: YES
targets:
  AISYSApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - AISYSApp/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.acertainromance401.aisys
        PRODUCT_NAME: AISYSApp
        INFOPLIST_KEY_CFBundleDisplayName: AI_SYS
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        SUPPORTS_MACCATALYST: YES
    scheme:
      testTargets:
        - AISYSAppTests

  AISYSAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    hostApplication: AISYSApp
    sources:
      - AISYSAppTests
    dependencies:
      - target: AISYSApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.acertainromance401.aisys.tests
        GENERATE_INFOPLIST_FILE: YES
